spring.application.name=NEWHUB

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# =========================
# ADMIN AI / OPENAI
# =========================
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=gpt-4.1-mini
ai.enabled=true

spring.mvc.async.request-timeout=900000

# Review Sync
review.sync.scripts-dir=${REVIEW_SYNC_SCRIPTS_DIR:/tmp/scripts}
review.sync.txt-path=${REVIEW_SYNC_TXT_PATH:/tmp/scripts/google_maps_reviews.txt}
review.sync.python-path=${REVIEW_SYNC_PYTHON_PATH:python}

# Upload path
reviewhub.upload.frontend-public=${REVIEWHUB_UPLOAD_FRONTEND_PUBLIC:/tmp/reviewhub-public}

# Cho phép upload ảnh lớn hơn mặc định
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
reviewhub.public-cache-dir=${REVIEWHUB_PUBLIC_CACHE_DIR:backend/reviewhub/data/public-review-cache}